name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve Tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.vars.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Validate Version Matches Tag
        shell: bash
        run: |
          set -euo pipefail
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${{ steps.vars.outputs.version }}"
          if [[ "$PKG_VERSION" != "$TAG_VERSION" ]]; then
            echo "Tag/version mismatch: tag=$TAG_VERSION package.json=$PKG_VERSION" >&2
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --runInBand

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Build Release Notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.vars.outputs.tag }}"
          NOTES_FILE=".github/release-notes/${TAG}.md"
          OUT="/tmp/release-body.md"
          if [[ -f "$NOTES_FILE" ]]; then
            cp "$NOTES_FILE" "$OUT"
            echo "used_custom_notes=true" >> "$GITHUB_OUTPUT"
          else
            {
              echo "Release ${TAG}"
              echo
              echo "No custom release notes file found at \`${NOTES_FILE}\`."
              echo "Using autogenerated notes."
            } > "$OUT"
            echo "used_custom_notes=false" >> "$GITHUB_OUTPUT"
          fi
          echo "body_path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (Custom Notes)
        if: steps.notes.outputs.used_custom_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          body_path: ${{ steps.notes.outputs.body_path }}
          generate_release_notes: false

      - name: Create GitHub Release (Autogenerated Notes)
        if: steps.notes.outputs.used_custom_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
